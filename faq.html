<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body class="p-5" style="font-family: 'Poppins', sans-serif;">

    <h1 class="text-center mb-4">FAQ</h1>
    <div class="accordion" id="accordionFAQ">

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#domanda1">
                    Che cos'è Git?
                </button>
            </h2>
            <div id="domanda1" class="accordion-collapse collapse show" data-bs-parent="#accordionFAQ">
                <div class="accordion-body">
                    Git è un sistema di versionamento che permette di salvare le modifiche di un progetto.
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                    data-bs-target="#domanda2">
                    Che cos'è un branch?
                </button>
            </h2>
            <div id="domanda2" class="accordion-collapse collapse" data-bs-parent="#accordionFAQ">
                <div class="accordion-body">
                    Un branch è un ramo separato del progetto dove si possono sviluppare nuove funzionalità.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
